upstream auth_service {
    server auth-service:8001;
}
upstream case_service {
    server case-service:8002;
}
upstream task_service {
    server task-service:8003;
}
upstream notify_service {
    server notify-service:8004;
}

server {
    listen 8000;
    server_name localhost;

    # --- Health ---
    location /health {
        return 200 '{"status":"ok","service":"gateway"}';
        add_header Content-Type application/json;
    }

    # --- Auth service ---
    location /api/auth/ {
        proxy_pass http://auth_service/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/users/ {
        proxy_pass http://auth_service/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/teams/ {
        proxy_pass http://auth_service/teams/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Case service ---
    location /api/cases/ {
        proxy_pass http://case_service/cases/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/comments/ {
        proxy_pass http://case_service/comments/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location /api/audit-logs/ {
        proxy_pass http://case_service/audit-logs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Task service ---
    location /api/tasks/ {
        proxy_pass http://task_service/tasks/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # --- Notification service ---
    location /api/notifications/ {
        proxy_pass http://notify_service/notifications/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
