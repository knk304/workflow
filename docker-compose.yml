version: "3.9"

services:
  # ---------- Infrastructure ----------
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Backend API ----------
  api:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DATABASE_NAME=workflow_platform
      - JWT_SECRET=workflow-dev-secret-change-in-production
      - CORS_ORIGINS=["http://localhost:4200"]
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
